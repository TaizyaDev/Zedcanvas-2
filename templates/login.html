<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sign In — ZedCanvas</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#f8f8f8;--surf:#fff;--bdr:#e8e8e8;--txt:#0a0a0a;--mute:#888;--sub:#f2f2f2;--inv:#0a0a0a;--inv-t:#f8f8f8;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
    .wrap{width:100%;max-width:380px;}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:.06em;text-align:center;margin-bottom:.2rem;}
    .sub{text-align:center;font-size:.85rem;color:var(--mute);margin-bottom:1.75rem;}
    .flash{padding:.65rem 1rem;border-radius:8px;font-size:.84rem;margin-bottom:.75rem;font-weight:500;}
    .flash.error{background:#fee2e2;color:#b91c1c;}
    .flash.success{background:var(--inv);color:var(--inv-t);}
    .fg{margin-bottom:.85rem;}
    .fl{display:block;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mute);margin-bottom:.3rem;}
    .fi{width:100%;padding:.75rem 1rem;border:1.5px solid var(--bdr);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.9rem;background:var(--surf);color:var(--txt);-webkit-appearance:none;}
    .fi:focus{outline:none;border-color:var(--txt);}
    .btn{width:100%;padding:.82rem;border-radius:9px;border:none;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;background:var(--inv);color:var(--inv-t);margin-top:.5rem;}
    .links{display:flex;justify-content:space-between;font-size:.8rem;color:var(--mute);margin-top:1rem;}
    .links a{color:var(--txt);font-weight:600;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">ZedCanvas</div>
    <div class="sub">Sign in to your account</div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}<div class="flash {{ cat }}">{{ msg }}</div>{% endfor %}
    {% endwith %}
    <form method="POST" action="{{ url_for('login') }}">
      <div class="fg"><label class="fl">Email or Username</label><input type="text" name="login_id" class="fi" autocomplete="username" required autofocus/></div>
      <div class="fg"><label class="fl">Password</label><input type="password" name="password" class="fi" autocomplete="current-password" required/></div>
      <button type="submit" class="btn">Sign In</button>
    </form>
    <div class="links">
      <a href="{{ url_for('forgot_password') }}">Forgot password?</a>
      <a href="{{ url_for('signup') }}">Create account</a>
    </div>
  </div>
</body>
</html>
