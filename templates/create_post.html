{% extends "base.html" %}{% block title %}New Post — ZedCanvas{% endblock %}
{% block content %}
<div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.06em;margin-bottom:1rem;">New Post 🎨</div>
<div class="card" style="padding:1.5rem;">
  <form method="POST" action="{{ url_for('create_post') }}" enctype="multipart/form-data">
    <div style="margin-bottom:1.1rem;">
      <label class="fl">Image</label>
      <div id="upload-area" onclick="document.getElementById('image').click()"
           style="border:2px dashed var(--bdr);border-radius:12px;padding:2.5rem 1rem;
                  text-align:center;cursor:pointer;background:var(--sub);transition:all .18s;">
        <div style="font-size:2.5rem;margin-bottom:.4rem;">🖼️</div>
        <div style="font-weight:600;font-size:.88rem;">Tap to upload artwork</div>
        <div style="font-size:.72rem;color:var(--mute);margin-top:.2rem;">JPG, PNG, WEBP — max 8MB</div>
      </div>
      <img id="preview" src="" style="display:none;width:100%;border-radius:12px;margin-top:.65rem;max-height:340px;object-fit:cover;" alt=""/>
      <input type="file" id="image" name="image" accept="image/*" style="display:none" onchange="previewImg(this)"/>
    </div>
    <div class="fg"><label class="fl">Caption</label>
      <textarea name="caption" class="fi" rows="3" placeholder="Describe your work... use @mentions and #tags"></textarea></div>
    <div class="fg"><label class="fl">Category</label>
      <select name="category" class="fi"><option value="">— Select —</option>
        {% for c in cats %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
      </select></div>
    <div class="fg"><label class="fl">Tags (comma separated)</label>
      <input type="text" name="tags" class="fi" placeholder="e.g. lusaka, watercolour, portrait"/></div>
    <button type="submit" class="btn btn-k btn-f">Share Post</button>
    <a href="{{ url_for('create_poll') }}" class="btn btn-o btn-f" style="margin-top:.5rem;">🗳️ Create a Poll instead</a>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
function previewImg(input){
  if(input.files&&input.files[0]){
    var r=new FileReader();
    r.onload=function(e){
      document.getElementById('preview').src=e.target.result;
      document.getElementById('preview').style.display='block';
      document.getElementById('upload-area').style.display='none';
    };
    r.readAsDataURL(input.files[0]);
  }
}
</script>
{% endblock %}
