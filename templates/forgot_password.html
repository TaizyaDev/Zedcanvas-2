{% extends "base.html" %}{% block title %}Forgot Password{% endblock %}
{% block content %}
<div style="max-width:380px;margin:2rem auto;">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.06em;margin-bottom:.25rem;">Reset Password</div>
  <p style="font-size:.85rem;color:var(--mute);margin-bottom:1.25rem;">Enter your email and we'll send a reset link.</p>
  <form method="POST">
    <div class="fg"><label class="fl">Email</label><input type="email" name="email" class="fi" required autofocus/></div>
    <button type="submit" class="btn btn-k btn-f">Send Reset Link</button>
  </form>
  <div style="text-align:center;margin-top:1rem;font-size:.82rem;"><a href="{{ url_for('login') }}" style="color:var(--mute);">← Back to login</a></div>
</div>
{% endblock %}
