{% extends "base.html" %}{% block title %}Saved — ZedCanvas{% endblock %}
{% block content %}
<div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.06em;margin-bottom:1rem;">Saved 🔖</div>
{% if posts %}
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:2px;border-radius:14px;overflow:hidden;">
    {% for p in posts %}{% if p.image %}
    <a href="{{ url_for('profile', username=p.author.username) if p.author else '#' }}" style="display:block;aspect-ratio:1/1;">
      <img src="{{ p.image }}" style="width:100%;height:100%;object-fit:cover;" alt=""/>
    </a>
    {% endif %}{% endfor %}
  </div>
{% else %}
  <div class="empty"><div class="empty-ico">🔖</div><h3>No saved posts</h3><p style="font-size:.85rem;margin:.4rem 0;">Tap the bookmark icon on any post to save it!</p></div>
{% endif %}
{% endblock %}
